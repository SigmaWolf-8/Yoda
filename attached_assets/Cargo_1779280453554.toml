#
#  ninja-exec — canonical signer + outermost wrapper (kernel-resident)
#
#  Holds the only TL-DSA-87 private key on a node, resident in kernel
#  memory (ring 0 / EL1 / M-mode). Performs every signature in the
#  stack. Wraps every cross-boundary operation with the envelope
#  discipline:
#
#    HPTP attosecond stamp + Rep D X-rotated encoding + TIS-27 sponge-chain
#    commit + ό.έ.δ |_) seal at radian-epoch + capability consumption
#    (single-use chain) + RAII atomic-transaction discipline
#
#  No HTTP listener. No Unix socket. No userspace IPC for the signing
#  path. Userspace clients invoke via XPlenum custom RISC-V instruction
#  (hardware-tier) or character device ioctl (non-XPlenum platforms).
#
#  Userspace `ninja-cli` is management-only (init / unlock / key-rotate
#  / export). Cannot sign by itself.
