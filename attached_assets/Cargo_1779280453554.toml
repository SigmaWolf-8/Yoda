[package]
name        = "ninja-exec"
version.workspace     = true
edition.workspace     = true
authors.workspace     = true
license.workspace     = true
repository.workspace  = true
description = "NinjaExec — canonical signer + outermost wrapper. Kernel-resident TL-DSA-87 signing core; envelope discipline composing HPTP attosecond timing + Rep D encoding + TIS-27 sponge-chain + ό.έ.δ epoch seal + single-use capability chain + atomic transaction. The seventh-pillar Capability-Bound layer."

[lib]
path = "src/lib.rs"

[dependencies]
aasc = { path = "../AASC" }

[features]
default = []
# `runtime` enables std-backed userspace CLI paths.
# Without it, ninja-exec is no_std (kernel-resident core only).
runtime = ["aasc/runtime"]

# The userspace management CLI. Requires `runtime`.
[[bin]]
name              = "ninja-cli"
path              = "src/bin/ninja-cli.rs"
required-features = ["runtime"]

